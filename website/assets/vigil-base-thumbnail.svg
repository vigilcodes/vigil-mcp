<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="628" viewBox="0 0 1200 628" fill="none">
  <defs>
    <linearGradient id="warm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8a961"/>
      <stop offset="100%" stop-color="#e8d5a3"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#1a160c"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
    <filter id="gl"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1200" height="628" fill="url(#glow)"/>

  <!-- faint grid -->
  <g stroke="#c8a961" stroke-width="0.5" opacity="0.05">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="314" x2="1200" y2="314"/>
    <line x1="0" y1="471" x2="1200" y2="471"/>
    <line x1="300" y1="0" x2="300" y2="628"/>
    <line x1="600" y1="0" x2="600" y2="628"/>
    <line x1="900" y1="0" x2="900" y2="628"/>
  </g>

  <!-- Owl mark, left -->
  <g transform="translate(150,170) scale(0.56)">
    <path d="M140,140 L175,200 L155,195" stroke="#c8a961" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M372,140 L337,200 L357,195" stroke="#c8a961" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M140,140 Q160,105 256,95 Q352,105 372,140 Q400,200 395,280 Q385,360 340,390 Q300,415 256,420 Q212,415 172,390 Q127,360 117,280 Q112,200 140,140 Z" stroke="#c8a961" stroke-width="2.5" fill="none" opacity="0.35"/>
    <path d="M175,230 L200,210 L230,210 L245,230 L230,260 L200,260 Z" stroke="#c8a961" stroke-width="3" fill="none" filter="url(#gl)"/>
    <circle cx="222" cy="238" r="9" fill="#c8a961" filter="url(#gl)"/>
    <circle cx="222" cy="238" r="3.5" fill="#e8d5a3"/>
    <path d="M337,230 L312,210 L282,210 L267,230 L282,260 L312,260 Z" stroke="#c8a961" stroke-width="3" fill="none" filter="url(#gl)"/>
    <circle cx="290" cy="238" r="9" fill="#c8a961" filter="url(#gl)"/>
    <circle cx="290" cy="238" r="3.5" fill="#e8d5a3"/>
    <path d="M240,290 L256,320 L272,290" stroke="#c8a961" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark + tagline, right -->
  <text x="470" y="270" fill="url(#warm)" font-family="DejaVu Sans Mono, monospace" font-size="96" font-weight="700" letter-spacing="14">VIGIL</text>
  <text x="474" y="320" fill="#9a9a9a" font-family="DejaVu Sans Mono, monospace" font-size="25" letter-spacing="2">Onchain security scanner for Base</text>

  <!-- chips -->
  <g font-family="DejaVu Sans Mono, monospace" font-size="20">
    <rect x="474" y="360" width="200" height="44" rx="22" fill="none" stroke="#c8a961" stroke-width="1.5" opacity="0.55"/>
    <text x="574" y="388" text-anchor="middle" fill="#c8a961">15 tools</text>
    <rect x="690" y="360" width="150" height="44" rx="22" fill="none" stroke="#c8a961" stroke-width="1.5" opacity="0.55"/>
    <text x="765" y="388" text-anchor="middle" fill="#c8a961">keyless</text>
    <rect x="856" y="360" width="230" height="44" rx="22" fill="none" stroke="#c8a961" stroke-width="1.5" opacity="0.55"/>
    <text x="971" y="388" text-anchor="middle" fill="#c8a961">x402 native</text>
  </g>

  <text x="474" y="470" fill="#6f6f6f" font-family="DejaVu Sans Mono, monospace" font-size="22" letter-spacing="1">scan before you sign</text>
  <text x="474" y="505" fill="#c8a961" font-family="DejaVu Sans Mono, monospace" font-size="22" opacity="0.85">vigil.codes</text>

  <rect x="0.5" y="0.5" width="1199" height="627" fill="none" stroke="#c8a961" stroke-width="1" opacity="0.15"/>
</svg>
