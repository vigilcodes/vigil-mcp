<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8a961"/>
      <stop offset="100%" stop-color="#e8d5a3"/>
    </linearGradient>
    <filter id="gl">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#080808"/>

  <!-- Header -->
  <text x="80" y="60" fill="#c8a961" font-family="'Courier New', monospace" font-size="11" letter-spacing="4" opacity="0.5">ARCHITECTURE</text>
  <text x="80" y="100" fill="#d4d0c8" font-family="Georgia, serif" font-size="36">MCP-Powered Security Pipeline</text>
  <line x1="80" y1="120" x2="340" y2="120" stroke="#c8a961" stroke-width="1" opacity="0.2"/>

  <!-- Flow diagram — horizontal -->
  <!-- Node 1: AI Client -->
  <g transform="translate(60, 200)">
    <rect width="200" height="120" rx="8" fill="none" stroke="#1e1e1c" stroke-width="1"/>
    <rect width="200" height="120" rx="8" fill="#c8a961" opacity="0.03"/>
    <text x="100" y="50" text-anchor="middle" fill="#c8a961" font-size="28">◈</text>
    <text x="100" y="78" text-anchor="middle" fill="#d4d0c8" font-family="'Courier New', monospace" font-size="14" font-weight="600">AI Client</text>
    <text x="100" y="100" text-anchor="middle" fill="#6b6860" font-family="'Courier New', monospace" font-size="10">Claude · Cursor · Aeon</text>
  </g>

  <!-- Arrow 1 -->
  <g transform="translate(280, 250)">
    <line x1="0" y1="10" x2="80" y2="10" stroke="#c8a961" stroke-width="1.5" opacity="0.4"/>
    <polygon points="80,5 90,10 80,15" fill="#c8a961" opacity="0.4"/>
    <text x="45" y="30" text-anchor="middle" fill="#3a3830" font-family="'Courier New', monospace" font-size="9">MCP</text>
  </g>

  <!-- Node 2: Transport -->
  <g transform="translate(390, 200)">
    <rect width="200" height="120" rx="8" fill="none" stroke="#1e1e1c" stroke-width="1"/>
    <rect width="200" height="120" rx="8" fill="#c8a961" opacity="0.03"/>
    <text x="100" y="50" text-anchor="middle" fill="#c8a961" font-size="28">◇</text>
    <text x="100" y="78" text-anchor="middle" fill="#d4d0c8" font-family="'Courier New', monospace" font-size="14" font-weight="600">Transport</text>
    <text x="100" y="100" text-anchor="middle" fill="#6b6860" font-family="'Courier New', monospace" font-size="10">SSE · Stdio · JSON-RPC</text>
  </g>

  <!-- Arrow 2 -->
  <g transform="translate(610, 250)">
    <line x1="0" y1="10" x2="80" y2="10" stroke="#c8a961" stroke-width="1.5" opacity="0.4"/>
    <polygon points="80,5 90,10 80,15" fill="#c8a961" opacity="0.4"/>
    <text x="45" y="30" text-anchor="middle" fill="#3a3830" font-family="'Courier New', monospace" font-size="9">HTTPS</text>
  </g>

  <!-- Node 3: VIGIL Agent (highlighted) -->
  <g transform="translate(720, 180)">
    <rect width="220" height="160" rx="8" fill="none" stroke="#c8a961" stroke-width="1.5" opacity="0.4"/>
    <rect width="220" height="160" rx="8" fill="#c8a961" opacity="0.06"/>
    <text x="110" y="45" text-anchor="middle" fill="#c8a961" font-size="32" filter="url(#gl)">◆</text>
    <text x="110" y="78" text-anchor="middle" fill="#d4d0c8" font-family="'Courier New', monospace" font-size="16" font-weight="600">VIGIL Agent</text>
    <text x="110" y="100" text-anchor="middle" fill="#6b6860" font-family="'Courier New', monospace" font-size="10">6 security tools</text>

    <!-- Mini tool list -->
    <text x="30" y="125" fill="#c8a961" font-family="'Courier New', monospace" font-size="9" opacity="0.5">approvals · token · honeypot</text>
    <text x="30" y="140" fill="#c8a961" font-family="'Courier New', monospace" font-size="9" opacity="0.5">score · revoke · report</text>
  </g>

  <!-- Arrow 3 -->
  <g transform="translate(960, 250)">
    <line x1="0" y1="10" x2="50" y2="10" stroke="#c8a961" stroke-width="1.5" opacity="0.4"/>
    <polygon points="50,5 60,10 50,15" fill="#c8a961" opacity="0.4"/>
  </g>

  <!-- Node 4: Base Chain -->
  <g transform="translate(1030, 200)">
    <rect width="120" height="120" rx="8" fill="none" stroke="#1e1e1c" stroke-width="1"/>
    <rect width="120" height="120" rx="8" fill="#c8a961" opacity="0.03"/>
    <text x="60" y="50" text-anchor="middle" fill="#0052FF" font-size="24">●</text>
    <text x="60" y="78" text-anchor="middle" fill="#d4d0c8" font-family="'Courier New', monospace" font-size="14" font-weight="600">Base</text>
    <text x="60" y="100" text-anchor="middle" fill="#6b6860" font-family="'Courier New', monospace" font-size="10">L2 · RPC</text>
  </g>

  <!-- Bottom section: Ecosystem integrations -->
  <line x1="60" y1="400" x2="1140" y2="400" stroke="#1e1e1c" stroke-width="1"/>

  <text x="80" y="440" fill="#c8a961" font-family="'Courier New', monospace" font-size="11" letter-spacing="3" opacity="0.5">ECOSYSTEM</text>

  <!-- Bankr badge -->
  <g transform="translate(60, 460)">
    <rect width="340" height="80" rx="4" fill="none" stroke="#1e1e1c" stroke-width="1"/>
    <text x="24" y="35" fill="#d4d0c8" font-family="'Courier New', monospace" font-size="14" font-weight="600">BankrBot/skills</text>
    <text x="24" y="55" fill="#6b6860" font-family="'Courier New', monospace" font-size="10">Transaction signing · Approval revocation</text>
    <text x="24" y="70" fill="#6b6860" font-family="'Courier New', monospace" font-size="10">PR #438 · github.com/BankrBot/skills</text>
  </g>

  <!-- Aeon badge -->
  <g transform="translate(430, 460)">
    <rect width="340" height="80" rx="4" fill="none" stroke="#1e1e1c" stroke-width="1"/>
    <text x="24" y="35" fill="#d4d0c8" font-family="'Courier New', monospace" font-size="14" font-weight="600">aaronjmars/aeon</text>
    <text x="24" y="55" fill="#6b6860" font-family="'Courier New', monospace" font-size="10">Autonomous agent framework</text>
    <text x="24" y="70" fill="#6b6860" font-family="'Courier New', monospace" font-size="10">PR #323 · Scheduled security scans</text>
  </g>

  <!-- MCP badge -->
  <g transform="translate(800, 460)">
    <rect width="340" height="80" rx="4" fill="none" stroke="#1e1e1c" stroke-width="1"/>
    <text x="24" y="35" fill="#d4d0c8" font-family="'Courier New', monospace" font-size="14" font-weight="600">MCP Protocol</text>
    <text x="24" y="55" fill="#6b6860" font-family="'Courier New', monospace" font-size="10">Standard agent-tool interface</text>
    <text x="24" y="70" fill="#6b6860" font-family="'Courier New', monospace" font-size="10">mcp.vigil.codes · SSE transport</text>
  </g>

  <!-- Footer -->
  <text x="1140" y="600" text-anchor="end" fill="#3a3830" font-family="'Courier New', monospace" font-size="11">vigil.codes</text>
</svg>