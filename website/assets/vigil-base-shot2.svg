<svg xmlns="http://www.w3.org/2000/svg" width="1284" height="2778" viewBox="0 0 1284 2778" fill="none">
  <defs>
    <linearGradient id="warm" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#c8a961"/><stop offset="100%" stop-color="#e8d5a3"/></linearGradient>
    <radialGradient id="bg" cx="50%" cy="20%" r="80%"><stop offset="0%" stop-color="#16110a"/><stop offset="100%" stop-color="#070707"/></radialGradient>
    <linearGradient id="danger" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#e0564a"/><stop offset="100%" stop-color="#f08a72"/></linearGradient>
  </defs>
  <rect width="1284" height="2778" fill="url(#bg)"/>
  <g stroke="#c8a961" stroke-width="0.6" opacity="0.045"><line x1="0" y1="700" x2="1284" y2="700"/><line x1="0" y1="1400" x2="1284" y2="1400"/><line x1="0" y1="2100" x2="1284" y2="2100"/></g>

  <text x="150" y="280" fill="#7d7d7d" font-family="DejaVu Sans Mono, monospace" font-size="40">vigil_detect_clone</text>
  <text x="150" y="370" fill="url(#warm)" font-family="DejaVu Sans Mono, monospace" font-size="78" font-weight="700">Clone Detector</text>
  <text x="150" y="440" fill="#8a8a8a" font-family="DejaVu Sans Mono, monospace" font-size="36">Same code, new name — caught.</text>

  <!-- terminal card -->
  <rect x="120" y="540" width="1044" height="1080" rx="28" fill="#0c0c0c" stroke="#c8a961" stroke-width="1.5" opacity="0.95"/>
  <circle cx="180" cy="600" r="12" fill="#e0564a" opacity="0.8"/><circle cx="220" cy="600" r="12" fill="#c8a961" opacity="0.8"/><circle cx="260" cy="600" r="12" fill="#5a5a5a"/>
  <text x="600" y="612" text-anchor="middle" fill="#5a5a5a" font-family="DejaVu Sans Mono, monospace" font-size="30">scan result</text>

  <g font-family="DejaVu Sans Mono, monospace" font-size="38">
    <text x="170" y="720" fill="#6f6f6f">$ vigil scan 0x9a3c…f21b</text>
    <text x="170" y="800" fill="#9a9a9a">fingerprint</text>
    <text x="170" y="850" fill="#cfcfcf">  c3f1a8…b community deployed 47x</text>

    <text x="170" y="950" fill="#9a9a9a">siblings</text>
    <text x="170" y="1000" fill="#cfcfcf">  46 copies, same bytecode</text>
    <text x="170" y="1050" fill="#cfcfcf">  3 already flagged as scams</text>

    <text x="170" y="1150" fill="#9a9a9a">verdict</text>
  </g>
  <rect x="170" y="1190" width="500" height="90" rx="16" fill="none" stroke="url(#danger)" stroke-width="3"/>
  <text x="200" y="1250" fill="url(#danger)" font-family="DejaVu Sans Mono, monospace" font-size="52" font-weight="700">DANGEROUS</text>

  <g font-family="DejaVu Sans Mono, monospace" font-size="36">
    <text x="170" y="1380" fill="#9a9a9a">reason</text>
    <text x="170" y="1430" fill="#cfcfcf">  copy-paste of a known scam</text>
    <text x="170" y="1480" fill="#cfcfcf">  contract cluster</text>
    <text x="170" y="1560" fill="#6f6f6f">  → don't sign. you're not early.</text>
  </g>

  <!-- caption -->
  <text x="642" y="1780" text-anchor="middle" fill="#cfcfcf" font-family="DejaVu Sans Mono, monospace" font-size="46">Scammers don't write new code.</text>
  <text x="642" y="1846" text-anchor="middle" fill="#cfcfcf" font-family="DejaVu Sans Mono, monospace" font-size="46">They redeploy the same one.</text>
  <text x="642" y="1940" text-anchor="middle" fill="#c8a961" font-family="DejaVu Sans Mono, monospace" font-size="46" font-weight="700">VIGIL catches that.</text>

  <text x="642" y="2520" text-anchor="middle" fill="#c8a961" font-family="DejaVu Sans Mono, monospace" font-size="46" opacity="0.9">mcp.vigil.codes</text>
  <rect x="40" y="40" width="1204" height="2698" rx="40" fill="none" stroke="#c8a961" stroke-width="1.5" opacity="0.18"/>
</svg>
