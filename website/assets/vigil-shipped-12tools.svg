<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8a961"/>
      <stop offset="100%" stop-color="#e8d5a3"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#080808"/>

  <!-- Header -->
  <text x="80" y="60" fill="#c8a961" font-family="'DM Mono', 'Courier New', monospace" font-size="11" letter-spacing="4" opacity="0.5">VIGIL . SHIPPED TODAY . BASE</text>
  <text x="80" y="110" fill="#d4d0c8" font-family="'DM Serif Display', Georgia, serif" font-size="44">New on VIGIL today.</text>
  <line x1="80" y1="132" x2="370" y2="132" stroke="#c8a961" stroke-width="1" opacity="0.25"/>

  <!-- What shipped -->
  <g font-family="'DM Mono', 'Courier New', monospace" font-size="15">
    <g transform="translate(80, 180)">
      <text x="0" y="0" fill="#c8a961">→</text><text x="28" y="0" fill="#d4d0c8">Token Market</text>
      <text x="180" y="0" fill="#6b6860" font-size="12">Price, liquidity, pool age for any token</text>
    </g>
    <g transform="translate(80, 220)">
      <text x="0" y="0" fill="#c8a961">→</text><text x="28" y="0" fill="#d4d0c8">Deployer Check</text>
      <text x="180" y="0" fill="#6b6860" font-size="12">Verification status + deployer reputation</text>
    </g>
    <g transform="translate(80, 260)">
      <text x="0" y="0" fill="#c8a961">→</text><text x="28" y="0" fill="#d4d0c8">Batch Scan</text>
      <text x="180" y="0" fill="#6b6860" font-size="12">Score every token in a wallet at once</text>
    </g>
    <g transform="translate(80, 300)">
      <text x="0" y="0" fill="#c8a961">→</text><text x="28" y="0" fill="#d4d0c8">Scam Database</text>
      <text x="180" y="0" fill="#6b6860" font-size="12">Community-reported scam contracts</text>
    </g>
    <g transform="translate(80, 340)">
      <text x="0" y="0" fill="#c8a961">→</text><text x="28" y="0" fill="#d4d0c8">Consensus Engine</text>
      <text x="180" y="0" fill="#6b6860" font-size="12">5 sources vote — one noisy flag can't trigger a false positive</text>
    </g>
  </g>

  <!-- Summary box -->
  <g transform="translate(80, 400)">
    <rect width="1040" height="80" rx="8" fill="#0d0d0d" stroke="#c8a961" stroke-width="1" opacity="0.3"/>
    <text x="30" y="35" fill="#c8a961" font-family="'DM Mono', 'Courier New', monospace" font-size="12" letter-spacing="2">12 TOOLS · 8 FREE · 3 PREMIUM (x402) · 1 ENDPOINT</text>
    <text x="30" y="60" fill="#d4d0c8" font-family="'DM Serif Display', Georgia, serif" font-size="18">Skip the rug. Scan first.</text>
  </g>

  <!-- Bottom bar -->
  <line x1="80" y1="545" x2="1120" y2="545" stroke="#1e1e1c" stroke-width="1"/>
  <text x="80" y="582" fill="#6b6860" font-family="'DM Mono', 'Courier New', monospace" font-size="13">read-only · no API key · any agent can scan before it signs</text>
  <text x="1120" y="582" text-anchor="end" fill="#c8a961" font-family="'DM Mono', 'Courier New', monospace" font-size="13" opacity="0.7">mcp.vigil.codes</text>
</svg>
