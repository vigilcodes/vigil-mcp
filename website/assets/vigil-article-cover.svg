<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 600" fill="none">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8a961"/>
      <stop offset="100%" stop-color="#e8d5a3"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c8a961" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#080808" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1500" height="600" fill="#080808"/>
  <ellipse cx="750" cy="300" rx="500" ry="280" fill="url(#glow)"/>

  <!-- Center everything around x=750 so X cropping doesn't kill the layout -->

  <!-- top label -->
  <text x="750" y="92" text-anchor="middle" fill="#c8a961" font-family="'Courier New', monospace" font-size="13" letter-spacing="6" opacity="0.55">VIGIL × AEON  ·  ONCHAIN SECURITY  ·  BASE</text>

  <!-- shield emblem (centered above title) -->
  <g transform="translate(750, 200)">
    <circle r="58" fill="none" stroke="#c8a961" stroke-width="1" opacity="0.18"/>
    <circle r="44" fill="none" stroke="#c8a961" stroke-width="1" opacity="0.32"/>
    <!-- two angular eyes -->
    <path d="M-26,-4 L-14,-14 L-2,-14 L4,-4 L-2,8 L-14,8 Z" fill="none" stroke="#c8a961" stroke-width="2"/>
    <path d="M26,-4 L14,-14 L2,-14 L-4,-4 L2,8 L14,8 Z" fill="none" stroke="#c8a961" stroke-width="2"/>
    <circle cx="-10" cy="-2" r="3" fill="#c8a961"/>
    <circle cx="10" cy="-2" r="3" fill="#c8a961"/>
    <path d="M-6,16 L0,28 L6,16" fill="none" stroke="#c8a961" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- main title -->
  <text x="750" y="320" text-anchor="middle" fill="#d4d0c8" font-family="Georgia, serif" font-size="76">Scan before you <tspan fill="url(#gold)" font-style="italic">sign.</tspan></text>

  <!-- subtitle -->
  <text x="750" y="372" text-anchor="middle" fill="#6b6860" font-family="Georgia, serif" font-size="22" font-style="italic">how I built the security layer for autonomous agents on Base.</text>

  <!-- divider -->
  <line x1="650" y1="408" x2="850" y2="408" stroke="#c8a961" stroke-width="1" opacity="0.3"/>

  <!-- stat strip — centered -->
  <g font-family="Georgia, serif">
    <text x="540" y="478" text-anchor="middle" fill="url(#gold)" font-size="44">98</text>
    <text x="540" y="510" text-anchor="middle" fill="#6b6860" font-family="'Courier New', monospace" font-size="11" letter-spacing="2">SCANS</text>

    <text x="680" y="478" text-anchor="middle" fill="url(#gold)" font-size="44">24</text>
    <text x="680" y="510" text-anchor="middle" fill="#6b6860" font-family="'Courier New', monospace" font-size="11" letter-spacing="2">TOKENS</text>

    <text x="820" y="478" text-anchor="middle" fill="url(#gold)" font-size="44">12</text>
    <text x="820" y="510" text-anchor="middle" fill="#6b6860" font-family="'Courier New', monospace" font-size="11" letter-spacing="2">TOOLS</text>

    <text x="960" y="478" text-anchor="middle" fill="#6bbd6b" font-size="44">$0</text>
    <text x="960" y="510" text-anchor="middle" fill="#6b6860" font-family="'Courier New', monospace" font-size="11" letter-spacing="2">SPEND</text>
  </g>

  <!-- footer -->
  <text x="750" y="560" text-anchor="middle" fill="#c8a961" font-family="'Courier New', monospace" font-size="13" opacity="0.7">vigil.codes</text>
</svg>
