<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 600" fill="none">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8a961"/>
      <stop offset="100%" stop-color="#e8d5a3"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c8a961" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#080808" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1500" height="600" fill="#080808"/>
  <circle cx="1180" cy="300" r="260" fill="url(#glow)"/>

  <!-- left content -->
  <text x="100" y="120" fill="#c8a961" font-family="'Courier New', monospace" font-size="13" letter-spacing="6" opacity="0.55">VIGIL × AEON · ONCHAIN SECURITY · BASE</text>
  <text x="100" y="218" fill="#d4d0c8" font-family="Georgia, serif" font-size="68">Scan before</text>
  <text x="100" y="290" fill="#d4d0c8" font-family="Georgia, serif" font-size="68">you <tspan fill="url(#gold)" font-style="italic">sign.</tspan></text>
  <text x="100" y="350" fill="#6b6860" font-family="Georgia, serif" font-size="22" font-style="italic">how I built the security layer for autonomous agents on Base.</text>

  <!-- stat strip -->
  <g transform="translate(100, 408)">
    <text x="0" y="20" fill="#6b6860" font-family="'Courier New', monospace" font-size="11" letter-spacing="2">LIVE TRACTION</text>
    <text x="0" y="76" fill="url(#gold)" font-family="Georgia, serif" font-size="44">98<tspan font-size="18" fill="#6b6860"> scans</tspan></text>
    <text x="200" y="76" fill="url(#gold)" font-family="Georgia, serif" font-size="44">24<tspan font-size="18" fill="#6b6860"> tokens</tspan></text>
    <text x="380" y="76" fill="url(#gold)" font-family="Georgia, serif" font-size="44">12<tspan font-size="18" fill="#6b6860"> tools</tspan></text>
    <text x="540" y="76" fill="#6bbd6b" font-family="Georgia, serif" font-size="44">$0<tspan font-size="18" fill="#6b6860"> spend</tspan></text>
  </g>

  <!-- right shield emblem (geometric owl-like) -->
  <g transform="translate(1180, 300)">
    <circle r="170" fill="none" stroke="#c8a961" stroke-width="1" opacity="0.18"/>
    <circle r="130" fill="none" stroke="#c8a961" stroke-width="1" opacity="0.28"/>
    <circle r="92" fill="none" stroke="#c8a961" stroke-width="1.2" opacity="0.5"/>
    <!-- two angular eyes -->
    <path d="M-58,-10 L-30,-30 L-2,-30 L14,-10 L-2,18 L-30,18 Z" fill="none" stroke="#c8a961" stroke-width="2.5"/>
    <path d="M58,-10 L30,-30 L2,-30 L-14,-10 L2,18 L30,18 Z" fill="none" stroke="#c8a961" stroke-width="2.5"/>
    <circle cx="-22" cy="-6" r="6" fill="#c8a961"/>
    <circle cx="22" cy="-6" r="6" fill="#c8a961"/>
    <!-- beak -->
    <path d="M-12,30 L0,52 L12,30" fill="none" stroke="#c8a961" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="1400" y="560" text-anchor="end" fill="#c8a961" font-family="'Courier New', monospace" font-size="14" opacity="0.7">vigil.codes</text>
</svg>
