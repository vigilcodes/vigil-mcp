<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8a961"/>
      <stop offset="100%" stop-color="#e8d5a3"/>
    </linearGradient>
    <filter id="gl">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="baseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0052ff"/>
      <stop offset="100%" stop-color="#0040cc"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#080808"/>

  <!-- Subtle grid -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#141414" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Owl logo -->
  <g transform="translate(470, 30) scale(0.3)">
    <path d="M140,140 L175,200 L155,195" stroke="#c8a961" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#gl)"/>
    <path d="M372,140 L337,200 L357,195" stroke="#c8a961" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#gl)"/>
    <path d="M140,140 Q160,105 256,95 Q352,105 372,140 Q400,200 395,280 Q385,360 340,390 Q300,415 256,420 Q212,415 172,390 Q127,360 117,280 Q112,200 140,140 Z" stroke="#c8a961" stroke-width="2" fill="none" opacity="0.3"/>
    <path d="M175,230 L200,210 L230,210 L245,230 L230,260 L200,260 Z" stroke="#c8a961" stroke-width="2.5" fill="none" filter="url(#gl)"/>
    <circle cx="222" cy="238" r="8" fill="#c8a961" opacity="0.8" filter="url(#gl)"/>
    <path d="M337,230 L312,210 L282,210 L267,230 L282,260 L312,260 Z" stroke="#c8a961" stroke-width="2.5" fill="none" filter="url(#gl)"/>
    <circle cx="290" cy="238" r="8" fill="#c8a961" opacity="0.8" filter="url(#gl)"/>
    <path d="M240,290 L256,320 L272,290" stroke="#c8a961" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#gl)"/>
  </g>

  <!-- VIGIL title -->
  <text x="600" y="140" text-anchor="middle" fill="url(#gold)" font-family="Georgia, serif" font-size="48">VIGIL</text>

  <!-- Tagline -->
  <text x="600" y="175" text-anchor="middle" fill="#6b6860" font-family="'Courier New', monospace" font-size="14" letter-spacing="4">ONCHAIN SECURITY AGENT</text>

  <!-- Code block — agents = true -->
  <g transform="translate(300, 210)">
    <rect width="600" height="160" rx="8" fill="#0e0e0e" stroke="#1e1e1c" stroke-width="1"/>
    <rect width="600" height="36" rx="8" fill="#141414"/>
    <rect y="28" width="600" height="8" fill="#141414"/>
    <circle cx="20" cy="18" r="5" fill="#c45c4c" opacity="0.6"/>
    <circle cx="36" cy="18" r="5" fill="#d4a843" opacity="0.6"/>
    <circle cx="52" cy="18" r="5" fill="#6bbd6b" opacity="0.6"/>
    <text x="580" y="22" text-anchor="end" fill="#3a3830" font-family="'Courier New', monospace" font-size="11">agents.config</text>

    <text x="30" y="72" fill="#6b6860" font-family="'Courier New', monospace" font-size="16">1</text>
    <text x="30" y="100" fill="#6b6860" font-family="'Courier New', monospace" font-size="16">2</text>
    <text x="30" y="128" fill="#6b6860" font-family="'Courier New', monospace" font-size="16">3</text>

    <text x="55" y="72" fill="#d4d0c8" font-family="'Courier New', monospace" font-size="16">{</text>
    <text x="75" y="100" fill="#c8a961" font-family="'Courier New', monospace" font-size="16">    agents = </text><text x="265" y="100" fill="#6bbd6b" font-family="'Courier New', monospace" font-size="16" font-weight="bold">true</text><text x="298" y="100" fill="#d4d0c8" font-family="'Courier New', monospace" font-size="16">;</text>
    <text x="55" y="128" fill="#d4d0c8" font-family="'Courier New', monospace" font-size="16">}</text>
  </g>

  <!-- Arrow down -->
  <text x="600" y="415" text-anchor="middle" fill="#c8a961" font-size="20" opacity="0.4">↓</text>

  <!-- VIGIL capabilities -->
  <g transform="translate(250, 430)">
    <rect width="700" height="110" rx="8" fill="none" stroke="#c8a961" stroke-width="1" opacity="0.2"/>
    <rect width="700" height="110" rx="8" fill="#c8a961" opacity="0.03"/>

    <text x="60" y="30" fill="#c8a961" font-family="'Courier New', monospace" font-size="13" opacity="0.8">▸ Scan approvals · Detect honeypots · Score safety</text>
    <text x="60" y="55" fill="#c8a961" font-family="'Courier New', monospace" font-size="13" opacity="0.8">▸ MCP-native · No approval loops · Autonomous</text>
    <text x="60" y="80" fill="#c8a961" font-family="'Courier New', monospace" font-size="13" opacity="0.8">▸ Live on Base · Integrated with Aeon ⚡</text>
  </g>

  <!-- Bottom bar -->
  <rect y="590" width="1200" height="40" fill="#0e0e0e"/>
  <text x="600" y="615" text-anchor="middle" fill="#3a3830" font-family="'Courier New', monospace" font-size="12">vigil.codes · github.com/vigilcodes/vigil-mcp · @vigilcodes</text>
</svg>