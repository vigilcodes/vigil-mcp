<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8a961"/>
      <stop offset="100%" stop-color="#e8d5a3"/>
    </linearGradient>
    <filter id="gl">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#080808"/>

  <!-- Grid lines -->
  <g stroke="#c8a961" stroke-width="0.3" opacity="0.04">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Owl logo — centered -->
  <g transform="translate(500, 120) scale(0.55)">
    <path d="M140,140 L175,200 L155,195" stroke="#c8a961" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#gl)"/>
    <path d="M372,140 L337,200 L357,195" stroke="#c8a961" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#gl)"/>
    <path d="M140,140 Q160,105 256,95 Q352,105 372,140 Q400,200 395,280 Q385,360 340,390 Q300,415 256,420 Q212,415 172,390 Q127,360 117,280 Q112,200 140,140 Z" stroke="#c8a961" stroke-width="2" fill="none" opacity="0.3"/>
    <path d="M175,230 L200,210 L230,210 L245,230 L230,260 L200,260 Z" stroke="#c8a961" stroke-width="2.5" fill="none" filter="url(#gl)"/>
    <circle cx="222" cy="238" r="18" stroke="#c8a961" stroke-width="1.5" fill="none" opacity="0.5"/>
    <circle cx="222" cy="238" r="8" fill="#c8a961" opacity="0.8" filter="url(#gl)"/>
    <circle cx="222" cy="238" r="3" fill="#e8d5a3"/>
    <path d="M337,230 L312,210 L282,210 L267,230 L282,260 L312,260 Z" stroke="#c8a961" stroke-width="2.5" fill="none" filter="url(#gl)"/>
    <circle cx="290" cy="238" r="18" stroke="#c8a961" stroke-width="1.5" fill="none" opacity="0.5"/>
    <circle cx="290" cy="238" r="8" fill="#c8a961" opacity="0.8" filter="url(#gl)"/>
    <circle cx="290" cy="238" r="3" fill="#e8d5a3"/>
    <path d="M240,290 L256,320 L272,290" stroke="#c8a961" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#gl)"/>
    <line x1="160" y1="238" x2="352" y2="238" stroke="#c8a961" stroke-width="0.5" opacity="0.15"/>
    <g stroke="#c8a961" stroke-width="1" opacity="0.2">
      <path d="M140,238 L100,238 L80,220" fill="none" stroke-linecap="round"/>
      <circle cx="80" cy="220" r="3" fill="#c8a961" opacity="0.4"/>
      <path d="M372,238 L412,238 L432,220" fill="none" stroke-linecap="round"/>
      <circle cx="432" cy="220" r="3" fill="#c8a961" opacity="0.4"/>
    </g>
  </g>

  <!-- VIGIL text -->
  <text x="600" y="410" text-anchor="middle" fill="url(#gold)" font-family="'DM Serif Display', Georgia, serif" font-size="64" font-weight="400" filter="url(#gl)">VIGIL</text>

  <!-- Tagline -->
  <text x="600" y="455" text-anchor="middle" fill="#6b6860" font-family="'DM Mono', 'Courier New', monospace" font-size="18" font-weight="300">Onchain Security Meets Autonomous Agents</text>

  <!-- Divider -->
  <line x1="450" y1="475" x2="750" y2="475" stroke="#c8a961" stroke-width="1" opacity="0.2"/>

  <!-- Ecosystem badges -->
  <g font-family="'DM Mono', 'Courier New', monospace" font-size="13" fill="#c8a961" opacity="0.6">
    <text x="350" y="520" text-anchor="middle">Base L2</text>
    <text x="600" y="520" text-anchor="middle">MCP Server</text>
    <text x="850" y="520" text-anchor="middle">Open Source</text>
  </g>

  <!-- Dot separators -->
  <circle cx="475" cy="516" r="2" fill="#c8a961" opacity="0.3"/>
  <circle cx="725" cy="516" r="2" fill="#c8a961" opacity="0.3"/>

  <!-- Bottom links -->
  <text x="600" y="580" text-anchor="middle" fill="#3a3830" font-family="'DM Mono', 'Courier New', monospace" font-size="12">vigil.codes · github.com/vigilcodes/vigil-mcp</text>
</svg>