  <text x="80" y="600" fill="#6b6860" font-family="'Courier New', monospace" font-size="13">A security agent should pass its own audit.</text>
  <text x="1120" y="600" text-anchor="end" fill="#c8a961" font-family="'Courier New', monospace" font-size="13" opacity="0.7">vigil.codes</text>
