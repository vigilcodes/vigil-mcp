<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 600" fill="none">
  <defs>
    <linearGradient id="bgfade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="42%" r="42%">
      <stop offset="0%" stop-color="#c8a961" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#c8a961" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1500" height="600" fill="url(#bgfade)"/>
  <rect width="1500" height="600" fill="url(#glow)"/>

  <!-- faint grid texture -->
  <g stroke="#161616" stroke-width="1">
    <line x1="0" y1="150" x2="1500" y2="150"/>
    <line x1="0" y1="300" x2="1500" y2="300"/>
    <line x1="0" y1="450" x2="1500" y2="450"/>
  </g>

  <!-- top label -->
  <text x="90" y="120" fill="#c8a961" font-family="'Courier New', monospace" font-size="18" letter-spacing="8" opacity="0.6">VIGIL . ONCHAIN SECURITY . BASE</text>

  <!-- title -->
  <text x="88" y="248" fill="#d4d0c8" font-family="Georgia, serif" font-size="92" font-weight="400">Shipped this</text>
  <text x="88" y="346" fill="#d4d0c8" font-family="Georgia, serif" font-size="92" font-weight="400">weekend.</text>

  <!-- subtitle -->
  <text x="92" y="410" fill="#6b6860" font-family="Georgia, serif" font-size="27" font-style="italic">15 tools. public stats. agent-discoverable. scan before you sign.</text>

  <!-- chips row -->
  <g font-family="'Courier New', monospace" font-size="17">
    <g transform="translate(90, 452)">
      <rect width="270" height="44" rx="22" fill="#0e1a0e" stroke="#6bbd6b" stroke-width="1" opacity="0.9"/>
      <circle cx="28" cy="22" r="6" fill="#6bbd6b"/>
      <text x="46" y="28" fill="#d4d0c8">approval simulator</text>
    </g>
    <g transform="translate(378, 452)">
      <rect width="240" height="44" rx="22" fill="#0e1a0e" stroke="#6bbd6b" stroke-width="1" opacity="0.9"/>
      <circle cx="28" cy="22" r="6" fill="#6bbd6b"/>
      <text x="46" y="28" fill="#d4d0c8">clone detector</text>
    </g>
    <g transform="translate(636, 452)">
      <rect width="270" height="44" rx="22" fill="#0c0c0c" stroke="#c8a961" stroke-width="1" opacity="0.6"/>
      <text x="24" y="28" fill="#c8a961">/.well-known/x402</text>
    </g>
  </g>

  <!-- emblem: shield diamond, right side -->
  <g transform="translate(1230, 300)" opacity="0.95">
    <circle cx="0" cy="0" r="118" fill="none" stroke="#c8a961" stroke-width="1.5" opacity="0.35"/>
    <circle cx="0" cy="0" r="92" fill="none" stroke="#c8a961" stroke-width="1" opacity="0.2"/>
    <path d="M0 -66 L52 -30 L52 34 L0 70 L-52 34 L-52 -30 Z" fill="none" stroke="#c8a961" stroke-width="2" opacity="0.8"/>
    <text x="0" y="14" text-anchor="middle" fill="#c8a961" font-family="Georgia, serif" font-size="46">◈</text>
  </g>

  <!-- footer -->
  <text x="90" y="556" fill="#6b6860" font-family="'Courier New', monospace" font-size="16">mcp.vigil.codes  ·  open source  ·  Base-native</text>
  <text x="1410" y="556" text-anchor="end" fill="#c8a961" font-family="'Courier New', monospace" font-size="16" opacity="0.7">vigil.codes</text>
</svg>
