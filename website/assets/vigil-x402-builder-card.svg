<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" fill="none">
  <defs>
    <linearGradient id="warm" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#c8a961"/><stop offset="100%" stop-color="#e8d5a3"/></linearGradient>
    <radialGradient id="bg" cx="50%" cy="28%" r="85%"><stop offset="0%" stop-color="#16110a"/><stop offset="100%" stop-color="#070707"/></radialGradient>
    <linearGradient id="ok" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#5fae7e"/><stop offset="100%" stop-color="#8fd0a3"/></linearGradient>
    <linearGradient id="base" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#4f7fff"/><stop offset="100%" stop-color="#84a6ff"/></linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <g stroke="#c8a961" stroke-width="0.5" opacity="0.045"><line x1="0" y1="225" x2="1200" y2="225"/><line x1="0" y1="450" x2="1200" y2="450"/><line x1="400" y1="0" x2="400" y2="675"/><line x1="800" y1="0" x2="800" y2="675"/></g>

  <text x="80" y="92" fill="#7d7d7d" font-family="DejaVu Sans Mono, monospace" font-size="24">x402 · onchain attribution · Base</text>
  <text x="80" y="158" fill="url(#warm)" font-family="DejaVu Sans Mono, monospace" font-size="58" font-weight="700">builders earning from</text>
  <text x="80" y="222" fill="url(#warm)" font-family="DejaVu Sans Mono, monospace" font-size="58" font-weight="700">what they build — live.</text>

  <!-- flow row -->
  <g font-family="DejaVu Sans Mono, monospace">
    <rect x="80" y="280" width="300" height="90" rx="14" fill="#0c0c0c" stroke="#c8a961" stroke-width="1.5"/>
    <text x="100" y="322" fill="#cfcfcf" font-size="24">AI agent</text>
    <text x="100" y="352" fill="#7d7d7d" font-size="19">needs a token scan</text>

    <text x="398" y="335" fill="#c8a961" font-size="34">→</text>

    <rect x="450" y="280" width="300" height="90" rx="14" fill="#0c0c0c" stroke="#c8a961" stroke-width="1.5"/>
    <text x="470" y="322" fill="#cfcfcf" font-size="24">pays $0.005 USDC</text>
    <text x="470" y="352" fill="#7d7d7d" font-size="19">x402 · no key, no signup</text>

    <text x="768" y="335" fill="#c8a961" font-size="34">→</text>

    <rect x="820" y="280" width="300" height="90" rx="14" fill="#0c0c0c" stroke="url(#ok)" stroke-width="1.5"/>
    <text x="840" y="322" fill="url(#ok)" font-size="24">verdict + settle</text>
    <text x="840" y="352" fill="#7d7d7d" font-size="19">attribution onchain</text>
  </g>

  <!-- proof block -->
  <rect x="80" y="410" width="1040" height="180" rx="16" fill="#0c0c0c" stroke="#c8a961" stroke-width="1.5"/>
  <text x="110" y="455" fill="#6f6f6f" font-family="DejaVu Sans Mono, monospace" font-size="20">builder code (ERC-8021)</text>
  <text x="430" y="455" fill="url(#warm)" font-family="DejaVu Sans Mono, monospace" font-size="20" font-weight="700">bc_kz42eeiy</text>
  <text x="110" y="498" fill="#6f6f6f" font-family="DejaVu Sans Mono, monospace" font-size="20">settled onchain</text>
  <text x="430" y="498" fill="#cfcfcf" font-family="DejaVu Sans Mono, monospace" font-size="20">0x515674ae…b102d6e ✓</text>
  <text x="110" y="541" fill="#6f6f6f" font-family="DejaVu Sans Mono, monospace" font-size="20">every scan</text>
  <text x="430" y="541" fill="url(#ok)" font-family="DejaVu Sans Mono, monospace" font-size="20">funds the next one</text>

  <text x="80" y="640" fill="#c8a961" font-family="DejaVu Sans Mono, monospace" font-size="28" opacity="0.9">mcp.vigil.codes</text>
  <text x="1120" y="640" text-anchor="end" fill="#6f6f6f" font-family="DejaVu Sans Mono, monospace" font-size="24">VIGIL · 17 tools · 👁</text>
  <rect x="0.5" y="0.5" width="1199" height="674" fill="none" stroke="#c8a961" stroke-width="1" opacity="0.15"/>
</svg>
