<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" fill="none">
  <defs>
    <linearGradient id="warm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8a961"/>
      <stop offset="100%" stop-color="#e8d5a3"/>
    </linearGradient>
    <filter id="gl">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gl2">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1500" height="500" fill="#080808"/>

  <!-- Grain texture -->
  <rect width="1500" height="500" fill="url(#warm)" opacity="0.01"/>

  <!-- Left decorative line -->
  <line x1="80" y1="0" x2="80" y2="500" stroke="#c8a961" stroke-width="0.5" opacity="0.08"/>
  <line x1="120" y1="0" x2="120" y2="500" stroke="#c8a961" stroke-width="0.3" opacity="0.05"/>

  <!-- Right decorative line -->
  <line x1="1420" y1="0" x2="1420" y2="500" stroke="#c8a961" stroke-width="0.5" opacity="0.08"/>
  <line x1="1380" y1="0" x2="1380" y2="500" stroke="#c8a961" stroke-width="0.3" opacity="0.05"/>

  <!-- Owl face — centered left -->
  <g transform="translate(280, 250) scale(0.75)">
    <!-- Left ear tuft -->
    <path d="M140,140 L175,200 L155,195" stroke="#c8a961" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#gl2)"/>
    <!-- Right ear tuft -->
    <path d="M372,140 L337,200 L357,195" stroke="#c8a961" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#gl2)"/>

    <!-- Outer face contour -->
    <path d="M140,140 Q160,105 256,95 Q352,105 372,140 Q400,200 395,280 Q385,360 340,390 Q300,415 256,420 Q212,415 172,390 Q127,360 117,280 Q112,200 140,140 Z" 
          stroke="#c8a961" stroke-width="2" fill="none" opacity="0.3"/>

    <!-- Left eye socket -->
    <path d="M175,230 L200,210 L230,210 L245,230 L230,260 L200,260 Z" 
          stroke="#c8a961" stroke-width="2.5" fill="none" filter="url(#gl2)"/>
    <circle cx="222" cy="238" r="18" stroke="#c8a961" stroke-width="1.5" fill="none" opacity="0.5"/>
    <circle cx="222" cy="238" r="8" fill="#c8a961" opacity="0.8" filter="url(#gl)"/>
    <circle cx="222" cy="238" r="3" fill="#e8d5a3"/>

    <!-- Right eye socket -->
    <path d="M337,230 L312,210 L282,210 L267,230 L282,260 L312,260 Z" 
          stroke="#c8a961" stroke-width="2.5" fill="none" filter="url(#gl2)"/>
    <circle cx="290" cy="238" r="18" stroke="#c8a961" stroke-width="1.5" fill="none" opacity="0.5"/>
    <circle cx="290" cy="238" r="8" fill="#c8a961" opacity="0.8" filter="url(#gl)"/>
    <circle cx="290" cy="238" r="3" fill="#e8d5a3"/>

    <!-- Beak -->
    <path d="M240,290 L256,320 L272,290" stroke="#c8a961" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#gl2)"/>

    <!-- Scan lines -->
    <line x1="160" y1="238" x2="352" y2="238" stroke="#c8a961" stroke-width="0.5" opacity="0.15"/>
    <line x1="170" y1="248" x2="342" y2="248" stroke="#c8a961" stroke-width="0.3" opacity="0.1"/>

    <!-- Circuit traces -->
    <g stroke="#c8a961" stroke-width="1" opacity="0.2">
      <path d="M140,238 L100,238 L80,220" fill="none" stroke-linecap="round"/>
      <circle cx="80" cy="220" r="3" fill="#c8a961" opacity="0.4"/>
      <path d="M140,260 L110,260 L90,280" fill="none" stroke-linecap="round"/>
      <circle cx="90" cy="280" r="3" fill="#c8a961" opacity="0.4"/>
      <path d="M372,238 L412,238 L432,220" fill="none" stroke-linecap="round"/>
      <circle cx="432" cy="220" r="3" fill="#c8a961" opacity="0.4"/>
      <path d="M372,260 L402,260 L422,280" fill="none" stroke-linecap="round"/>
      <circle cx="422" cy="280" r="3" fill="#c8a961" opacity="0.4"/>
    </g>

    <!-- Grid pattern -->
    <g stroke="#c8a961" stroke-width="0.3" opacity="0.06">
      <line x1="200" y1="150" x2="312" y2="150"/>
      <line x1="185" y1="180" x2="327" y2="180"/>
      <line x1="170" y1="210" x2="342" y2="210"/>
      <line x1="165" y1="300" x2="347" y2="300"/>
      <line x1="180" y1="330" x2="332" y2="330"/>
      <line x1="200" y1="360" x2="312" y2="360"/>
    </g>
  </g>

  <!-- Divider line -->
  <line x1="560" y1="120" x2="560" y2="380" stroke="#c8a961" stroke-width="1" opacity="0.15"/>

  <!-- Text content -->
  <text x="620" y="195" fill="#c8a961" font-family="'DM Mono', 'Courier New', monospace" font-size="14" font-weight="400" letter-spacing="8" opacity="0.6">AGENT-BASED MCP SECURITY SERVER</text>

  <text x="620" y="270" fill="#d4d0c8" font-family="'DM Serif Display', Georgia, serif" font-size="72" font-weight="400">VIGIL</text>

  <text x="620" y="320" fill="#6b6860" font-family="'DM Mono', 'Courier New', monospace" font-size="18" font-weight="300">See what others miss. Onchain security on Base.</text>

  <text x="620" y="380" fill="#c8a961" font-family="'DM Mono', 'Courier New', monospace" font-size="12" font-weight="400" letter-spacing="4" opacity="0.5">vigil.codes</text>

  <!-- Bottom border accent -->
  <line x1="620" y1="400" x2="780" y2="400" stroke="#c8a961" stroke-width="1" opacity="0.2"/>
</svg>