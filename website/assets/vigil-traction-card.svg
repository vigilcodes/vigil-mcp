  <text x="80" y="470" fill="#9a968e" font-family="'DM Serif Display', Georgia, serif" font-size="22" font-style="italic">first day of the Telegram bot. just shipped it.</text>

  <line x1="80" y1="520" x2="1120" y2="520" stroke="#1e1e1c"/>
  <text x="80" y="558" fill="#6b6860" font-family="'DM Mono', 'Courier New', monospace" font-size="13">scan any Base token — @vigilcodesbot · vigil.codes/scan</text>
  <text x="1120" y="558" text-anchor="end" fill="#c8a961" font-family="'DM Mono', 'Courier New', monospace" font-size="13" opacity="0.7">🛡️ VIGIL</text>
