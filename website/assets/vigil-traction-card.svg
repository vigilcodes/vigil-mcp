<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8a961"/>
      <stop offset="100%" stop-color="#e8d5a3"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#080808"/>

  <text x="80" y="72" fill="#c8a961" font-family="'DM Mono', 'Courier New', monospace" font-size="11" letter-spacing="4" opacity="0.5">VIGIL . DAY ONE</text>
  <text x="80" y="128" fill="#d4d0c8" font-family="'DM Serif Display', Georgia, serif" font-size="46">People are already</text>
  <text x="80" y="182" fill="#d4d0c8" font-family="'DM Serif Display', Georgia, serif" font-size="46">using it. <tspan fill="url(#gold)" font-style="italic">No push.</tspan></text>
  <line x1="80" y1="206" x2="340" y2="206" stroke="#c8a961" stroke-width="1" opacity="0.25"/>

  <!-- stat blocks -->
  <g>
    <rect x="80" y="246" width="320" height="170" rx="12" fill="#0d0d0d" stroke="#c8a961" stroke-width="1" opacity="0.3"/>
    <text x="110" y="300" fill="#6b6860" font-family="'DM Mono', 'Courier New', monospace" font-size="13" letter-spacing="2">TOKEN SCANS</text>
    <text x="110" y="372" fill="url(#gold)" font-family="'DM Serif Display', Georgia, serif" font-size="74">8</text>

    <rect x="430" y="246" width="320" height="170" rx="12" fill="#0d0d0d" stroke="#c8a961" stroke-width="1" opacity="0.3"/>
    <text x="460" y="300" fill="#6b6860" font-family="'DM Mono', 'Courier New', monospace" font-size="13" letter-spacing="2">UNIQUE USERS</text>
    <text x="460" y="372" fill="url(#gold)" font-family="'DM Serif Display', Georgia, serif" font-size="74">5</text>

    <rect x="780" y="246" width="340" height="170" rx="12" fill="#0d0d0d" stroke="#c8a961" stroke-width="1" opacity="0.3"/>
    <text x="810" y="300" fill="#6b6860" font-family="'DM Mono', 'Courier New', monospace" font-size="13" letter-spacing="2">MARKETING SPEND</text>
