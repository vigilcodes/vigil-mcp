<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8a961"/>
      <stop offset="100%" stop-color="#e8d5a3"/>
    </linearGradient>
    <filter id="gl">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#080808"/>

  <!-- Owl logo small -->
  <g transform="translate(470, 50) scale(0.35)">
    <path d="M140,140 L175,200 L155,195" stroke="#c8a961" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#gl)"/>
    <path d="M372,140 L337,200 L357,195" stroke="#c8a961" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#gl)"/>
    <path d="M140,140 Q160,105 256,95 Q352,105 372,140 Q400,200 395,280 Q385,360 340,390 Q300,415 256,420 Q212,415 172,390 Q127,360 117,280 Q112,200 140,140 Z" stroke="#c8a961" stroke-width="2" fill="none" opacity="0.3"/>
    <path d="M175,230 L200,210 L230,210 L245,230 L230,260 L200,260 Z" stroke="#c8a961" stroke-width="2.5" fill="none" filter="url(#gl)"/>
    <circle cx="222" cy="238" r="8" fill="#c8a961" opacity="0.8" filter="url(#gl)"/>
    <path d="M337,230 L312,210 L282,210 L267,230 L282,260 L312,260 Z" stroke="#c8a961" stroke-width="2.5" fill="none" filter="url(#gl)"/>
    <circle cx="290" cy="238" r="8" fill="#c8a961" opacity="0.8" filter="url(#gl)"/>
    <path d="M240,290 L256,320 L272,290" stroke="#c8a961" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#gl)"/>
  </g>

  <!-- VIGIL text -->
  <text x="600" y="185" text-anchor="middle" fill="url(#gold)" font-family="Georgia, serif" font-size="42">VIGIL</text>

  <!-- Merged badge -->
  <g transform="translate(440, 210)">
    <rect width="320" height="32" rx="16" fill="#c8a961" opacity="0.15"/>
    <text x="160" y="22" text-anchor="middle" fill="#c8a961" font-family="'Courier New', monospace" font-size="12" font-weight="600">MERGED INTO BANKR SKILLS</text>
  </g>

  <!-- Arrow down -->
  <text x="600" y="290" text-anchor="middle" fill="#c8a961" font-size="24" opacity="0.4">↓</text>

  <!-- Bankr box -->
  <g transform="translate(250, 310)">
    <rect width="700" height="180" rx="8" fill="none" stroke="#c8a961" stroke-width="1.5" opacity="0.3"/>
    <rect width="700" height="180" rx="8" fill="#c8a961" opacity="0.04"/>
    <text x="350" y="45" text-anchor="middle" fill="#d4d0c8" font-family="'Courier New', monospace" font-size="24" font-weight="600">BankrBot/skills</text>
    <text x="350" y="75" text-anchor="middle" fill="#6b6860" font-family="'Courier New', monospace" font-size="14">Plug-and-play tools for Bankr agents</text>

    <!-- Install command -->
    <g transform="translate(60, 95)">
      <rect width="580" height="30" rx="4" fill="#0e0e0e" stroke="#1e1e1c" stroke-width="1"/>
      <text x="16" y="20" fill="#c8a961" font-family="'Courier New', monospace" font-size="12">&gt; install the vigil skill from BankrBot/skills</text>
    </g>

    <text x="60" y="155" fill="#c8a961" font-family="'Courier New', monospace" font-size="12" opacity="0.6">▸ Scan approvals · Detect honeypots · Score contracts</text>
    <text x="60" y="170" fill="#c8a961" font-family="'Courier New', monospace" font-size="12" opacity="0.6">▸ Revoke dangerous approvals via Bankr signing</text>
  </g>

  <!-- Bottom -->
  <text x="600" y="550" text-anchor="middle" fill="#3a3830" font-family="'Courier New', monospace" font-size="12">vigil.codes · github.com/vigilcodes/vigil-mcp</text>
</svg>