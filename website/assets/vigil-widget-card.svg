<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8a961"/>
      <stop offset="100%" stop-color="#e8d5a3"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#080808"/>

  <text x="80" y="70" fill="#c8a961" font-family="'Courier New', monospace" font-size="11" letter-spacing="4" opacity="0.5">VIGIL . EMBEDDABLE SAFETY BADGE</text>
  <text x="80" y="124" fill="#d4d0c8" font-family="Georgia, serif" font-size="44">VIGIL-verified, on your site</text>
  <text x="80" y="158" fill="#6b6860" font-family="Georgia, serif" font-size="19" font-style="italic">one iframe → a live safety score for your token.</text>
  <line x1="80" y1="180" x2="340" y2="180" stroke="#c8a961" stroke-width="1" opacity="0.25"/>

  <!-- the badge preview -->
  <text x="80" y="232" fill="#6b6860" font-family="'Courier New', monospace" font-size="12" letter-spacing="3">LIVE BADGE</text>
  <g transform="translate(80, 248)">
    <rect width="420" height="92" rx="14" fill="#0c0c0c" stroke="#c8a961" stroke-width="1" opacity="0.35"/>
    <rect x="24" y="26" width="40" height="40" rx="9" fill="#c8a961" opacity="0.1"/>
    <text x="44" y="53" text-anchor="middle" font-size="20">🛡️</text>
    <text x="92" y="62" fill="#6bbd6b" font-family="Georgia, serif" font-size="40">93</text>
    <line x1="150" y1="28" x2="150" y2="64" stroke="#1e1e1c" stroke-width="1"/>
    <text x="168" y="42" fill="#d4d0c8" font-family="'Courier New', monospace" font-size="14">$VIGIL</text>
    <text x="168" y="60" fill="#6bbd6b" font-family="'Courier New', monospace" font-size="12" letter-spacing="2">SAFE</text>
    <text x="168" y="78" fill="#6b6860" font-family="'Courier New', monospace" font-size="9" letter-spacing="1">VIGIL · SCAN BEFORE YOU SIGN</text>
  </g>

  <!-- the snippet -->
  <text x="80" y="392" fill="#6b6860" font-family="'Courier New', monospace" font-size="12" letter-spacing="3">ONE LINE TO EMBED</text>
  <g transform="translate(80, 408)">
    <rect width="1040" height="120" rx="12" fill="#0c0c0c" stroke="#1e1e1c" stroke-width="1"/>
    <text x="28" y="48" fill="#6bbd6b" font-family="'Courier New', monospace" font-size="16">&lt;iframe src=</text>
    <text x="160" y="48" fill="#c8a961" font-family="'Courier New', monospace" font-size="16">"https://vigil.codes/widget?token=0x…&amp;chain=base"</text>
    <text x="28" y="80" fill="#d4d0c8" font-family="'Courier New', monospace" font-size="16">  width="280" height="62" frameborder="0"&gt;&lt;/iframe&gt;</text>
    <text x="28" y="104" fill="#6b6860" font-family="'Courier New', monospace" font-size="13">drop it on any page · live honeypot + safety check · no key</text>
  </g>

  <line x1="80" y1="556" x2="1120" y2="556" stroke="#1e1e1c" stroke-width="1"/>
  <text x="80" y="592" fill="#6b6860" font-family="'Courier New', monospace" font-size="13">show your holders the token is clean — backed by VIGIL</text>
  <text x="1120" y="592" text-anchor="end" fill="#c8a961" font-family="'Courier New', monospace" font-size="13" opacity="0.7">vigil.codes</text>
</svg>
