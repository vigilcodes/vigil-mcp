  <!-- Consensus highlight -->
  <g transform="translate(80, 420)">
    <rect width="1040" height="80" rx="8" fill="#0d0d0d" stroke="#c8a961" stroke-width="1" opacity="0.3"/>
    <text x="30" y="35" fill="#c8a961" font-family="'Courier New', monospace" font-size="12" letter-spacing="2">★ 8 FREE TOOLS · 3 PREMIUM (x402) · 1 PROTOCOL</text>
    <text x="30" y="60" fill="#d4d0c8" font-family="Georgia, serif" font-size="18">Any AI agent can plug in. No API key for read-only scans.</text>
  </g>

  <!-- Bottom bar -->
  <line x1="80" y1="545" x2="1120" y2="545" stroke="#1e1e1c" stroke-width="1"/>
  <text x="80" y="582" fill="#6b6860" font-family="'Courier New', monospace" font-size="13">read-only · no API key · any agent can scan before it signs</text>
  <text x="1120" y="582" text-anchor="end" fill="#c8a961" font-family="'Courier New', monospace" font-size="13" opacity="0.7">mcp.vigil.codes</text>
