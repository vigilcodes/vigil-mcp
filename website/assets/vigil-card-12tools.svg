<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8a961"/>
      <stop offset="100%" stop-color="#e8d5a3"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#080808"/>

  <!-- Header -->
  <text x="80" y="60" fill="#c8a961" font-family="'Courier New', monospace" font-size="11" letter-spacing="4" opacity="0.5">VIGIL . 12 SECURITY TOOLS . BASE</text>
  <text x="80" y="110" fill="#d4d0c8" font-family="Georgia, serif" font-size="44">12 tools. One endpoint.</text>
  <line x1="80" y1="132" x2="380" y2="132" stroke="#c8a961" stroke-width="1" opacity="0.25"/>

  <!-- Tool grid: 3 cols x 4 rows -->
  <g font-family="'Courier New', monospace" font-size="15">
    <!-- Row 1 -->
    <g transform="translate(80, 180)">
      <text x="0" y="0" fill="#c8a961" opacity="0.5">01</text><text x="38" y="0" fill="#d4d0c8">Approval Scanner</text>
      <text x="38" y="20" fill="#6b6860" font-size="11">Flag unlimited allowances</text>
    </g>
    <g transform="translate(450, 180)">
      <text x="0" y="0" fill="#c8a961" opacity="0.5">02</text><text x="38" y="0" fill="#d4d0c8">Token Scanner</text>
      <text x="38" y="20" fill="#6b6860" font-size="11">Rugpull indicators</text>
    </g>
    <g transform="translate(820, 180)">
      <text x="0" y="0" fill="#c8a961" opacity="0.5">03</text><text x="38" y="0" fill="#d4d0c8">Honeypot Detector</text>
      <text x="38" y="20" fill="#6b6860" font-size="11">Buy/sell simulation</text>
    </g>

    <!-- Row 2 -->
    <g transform="translate(80, 240)">
      <text x="0" y="0" fill="#c8a961" opacity="0.5">04</text><text x="38" y="0" fill="#d4d0c8">Safety Score</text>
      <text x="38" y="20" fill="#6b6860" font-size="11">0–100 contract rating</text>
    </g>
    <g transform="translate(450, 240)">
      <text x="0" y="0" fill="#c8a961" opacity="0.5">05</text><text x="38" y="0" fill="#d4d0c8">Wallet Report</text>
      <text x="38" y="20" fill="#6b6860" font-size="11">Full security audit</text>
    </g>
    <g transform="translate(820, 240)">
      <text x="0" y="0" fill="#c8a961" opacity="0.5">06</text><text x="38" y="0" fill="#d4d0c8">Wallet Monitor</text>
      <text x="38" y="20" fill="#6b6860" font-size="11">Real-time alerts</text>
    </g>

    <!-- Row 3 -->
    <g transform="translate(80, 300)">
      <text x="0" y="0" fill="#c8a961" opacity="0.5">07</text><text x="38" y="0" fill="#d4d0c8">Token Market</text>
      <text x="38" y="20" fill="#6b6860" font-size="11">Price &amp; liquidity</text>
    </g>
    <g transform="translate(450, 300)">
      <text x="0" y="0" fill="#c8a961" opacity="0.5">08</text><text x="38" y="0" fill="#d4d0c8">Deployer Check</text>
      <text x="38" y="20" fill="#6b6860" font-size="11">Reputation analysis</text>
    </g>
    <g transform="translate(820, 300)">
      <text x="0" y="0" fill="#c8a961" opacity="0.5">09</text><text x="38" y="0" fill="#d4d0c8">Batch Scan</text>
      <text x="38" y="20" fill="#6b6860" font-size="11">Multi-token scan</text>
    </g>

    <!-- Row 4 -->
    <g transform="translate(80, 360)">
      <text x="0" y="0" fill="#c8a961" opacity="0.5">10</text><text x="38" y="0" fill="#d4d0c8">Scam Database</text>
      <text x="38" y="20" fill="#6b6860" font-size="11">Community reports</text>
    </g>
    <g transform="translate(450, 360)">
      <text x="0" y="0" fill="#c8a961" opacity="0.5">11</text><text x="38" y="0" fill="#d4d0c8">Sentinel</text>
      <text x="38" y="20" fill="#6b6860" font-size="11">Autonomous monitoring</text>
    </g>
    <g transform="translate(820, 360)">
      <text x="0" y="0" fill="url(#gold)">12</text><text x="38" y="0" fill="url(#gold)">Consensus ★</text>
      <text x="38" y="20" fill="#6b6860" font-size="11">Multi-scanner verdict</text>
    </g>
