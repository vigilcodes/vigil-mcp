<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8a961"/>
      <stop offset="100%" stop-color="#e8d5a3"/>
    </linearGradient>
    <filter id="gl">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#080808"/>

  <!-- Owl logo small -->
  <g transform="translate(470, 60) scale(0.4)">
    <path d="M140,140 L175,200 L155,195" stroke="#c8a961" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#gl)"/>
    <path d="M372,140 L337,200 L357,195" stroke="#c8a961" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#gl)"/>
    <path d="M140,140 Q160,105 256,95 Q352,105 372,140 Q400,200 395,280 Q385,360 340,390 Q300,415 256,420 Q212,415 172,390 Q127,360 117,280 Q112,200 140,140 Z" stroke="#c8a961" stroke-width="2" fill="none" opacity="0.3"/>
    <path d="M175,230 L200,210 L230,210 L245,230 L230,260 L200,260 Z" stroke="#c8a961" stroke-width="2.5" fill="none" filter="url(#gl)"/>
    <circle cx="222" cy="238" r="8" fill="#c8a961" opacity="0.8" filter="url(#gl)"/>
    <path d="M337,230 L312,210 L282,210 L267,230 L282,260 L312,260 Z" stroke="#c8a961" stroke-width="2.5" fill="none" filter="url(#gl)"/>
    <circle cx="290" cy="238" r="8" fill="#c8a961" opacity="0.8" filter="url(#gl)"/>
    <path d="M240,290 L256,320 L272,290" stroke="#c8a961" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#gl)"/>
  </g>

  <!-- VIGIL text -->
  <text x="600" y="200" text-anchor="middle" fill="url(#gold)" font-family="Georgia, serif" font-size="48">VIGIL</text>

  <!-- Handshake icon -->
  <text x="600" y="290" text-anchor="middle" fill="#c8a961" font-size="48" opacity="0.6">🤝</text>

  <!-- Ecosystem boxes -->
  <!-- Bankr -->
  <g transform="translate(200, 330)">
    <rect width="350" height="100" rx="8" fill="none" stroke="#c8a961" stroke-width="1.5" opacity="0.3"/>
    <rect width="350" height="100" rx="8" fill="#c8a961" opacity="0.04"/>
    <text x="175" y="42" text-anchor="middle" fill="#d4d0c8" font-family="'Courier New', monospace" font-size="20" font-weight="600">BankrBot/skills</text>
    <text x="175" y="65" text-anchor="middle" fill="#6b6860" font-family="'Courier New', monospace" font-size="12">Transaction signing · Revocation</text>
    <text x="175" y="82" text-anchor="middle" fill="#c8a961" font-family="'Courier New', monospace" font-size="11" opacity="0.5">PR #438</text>
  </g>

  <!-- Aeon -->
  <g transform="translate(650, 330)">
    <rect width="350" height="100" rx="8" fill="none" stroke="#c8a961" stroke-width="1.5" opacity="0.3"/>
    <rect width="350" height="100" rx="8" fill="#c8a961" opacity="0.04"/>
    <text x="175" y="42" text-anchor="middle" fill="#d4d0c8" font-family="'Courier New', monospace" font-size="20" font-weight="600">aaronjmars/aeon</text>
    <text x="175" y="65" text-anchor="middle" fill="#6b6860" font-family="'Courier New', monospace" font-size="12">Autonomous agent framework</text>
    <text x="175" y="82" text-anchor="middle" fill="#c8a961" font-family="'Courier New', monospace" font-size="11" opacity="0.5">PR #323</text>
  </g>

  <!-- Bottom -->
  <text x="600" y="510" text-anchor="middle" fill="#6b6860" font-family="'Courier New', monospace" font-size="14">Onchain security for DeFi traders on Base</text>
  <line x1="400" y1="530" x2="800" y2="530" stroke="#c8a961" stroke-width="1" opacity="0.15"/>
  <text x="600" y="570" text-anchor="middle" fill="#3a3830" font-family="'Courier New', monospace" font-size="12">vigil.codes · github.com/vigilcodes/vigil-mcp</text>
