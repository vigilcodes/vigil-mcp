<svg xmlns="http://www.w3.org/2000/svg" width="1284" height="2778" viewBox="0 0 1284 2778" fill="none">
  <defs>
    <linearGradient id="warm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8a961"/><stop offset="100%" stop-color="#e8d5a3"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="22%" r="80%">
      <stop offset="0%" stop-color="#171309"/><stop offset="100%" stop-color="#070707"/>
    </radialGradient>
    <filter id="gl"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1284" height="2778" fill="url(#bg)"/>
  <g stroke="#c8a961" stroke-width="0.6" opacity="0.045">
    <line x1="0" y1="700" x2="1284" y2="700"/><line x1="0" y1="1400" x2="1284" y2="1400"/><line x1="0" y1="2100" x2="1284" y2="2100"/>
    <line x1="428" y1="0" x2="428" y2="2778"/><line x1="856" y1="0" x2="856" y2="2778"/>
  </g>

  <!-- Owl mark centered -->
  <g transform="translate(442,300) scale(0.78)">
    <path d="M140,140 L175,200 L155,195" stroke="#c8a961" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M372,140 L337,200 L357,195" stroke="#c8a961" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M140,140 Q160,105 256,95 Q352,105 372,140 Q400,200 395,280 Q385,360 340,390 Q300,415 256,420 Q212,415 172,390 Q127,360 117,280 Q112,200 140,140 Z" stroke="#c8a961" stroke-width="2.5" fill="none" opacity="0.35"/>
    <path d="M175,230 L200,210 L230,210 L245,230 L230,260 L200,260 Z" stroke="#c8a961" stroke-width="3.5" fill="none" filter="url(#gl)"/>
    <circle cx="222" cy="238" r="11" fill="#c8a961" filter="url(#gl)"/><circle cx="222" cy="238" r="4" fill="#e8d5a3"/>
    <path d="M337,230 L312,210 L282,210 L267,230 L282,260 L312,260 Z" stroke="#c8a961" stroke-width="3.5" fill="none" filter="url(#gl)"/>
    <circle cx="290" cy="238" r="11" fill="#c8a961" filter="url(#gl)"/><circle cx="290" cy="238" r="4" fill="#e8d5a3"/>
    <path d="M240,290 L256,320 L272,290" stroke="#c8a961" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="642" y="820" text-anchor="middle" fill="url(#warm)" font-family="DejaVu Sans Mono, monospace" font-size="150" font-weight="700" letter-spacing="22">VIGIL</text>
  <text x="642" y="910" text-anchor="middle" fill="#b8b8b8" font-family="DejaVu Sans Mono, monospace" font-size="44">Scan before you sign</text>

  <text x="642" y="1080" text-anchor="middle" fill="#7d7d7d" font-family="DejaVu Sans Mono, monospace" font-size="38">Onchain security scanner for Base,</text>
  <text x="642" y="1136" text-anchor="middle" fill="#7d7d7d" font-family="DejaVu Sans Mono, monospace" font-size="38">callable by any AI agent.</text>

  <!-- 3 big stat tiles -->
  <g font-family="DejaVu Sans Mono, monospace">
    <rect x="150" y="1300" width="984" height="200" rx="24" fill="#0e0e0e" stroke="#c8a961" stroke-width="1.5" opacity="0.9"/>
    <text x="200" y="1410" fill="url(#warm)" font-size="92" font-weight="700">15</text>
    <text x="380" y="1395" fill="#cfcfcf" font-size="44">read-only security tools</text>
    <text x="380" y="1450" fill="#6f6f6f" font-size="32">honeypot · rugpull · approvals · clones</text>

    <rect x="150" y="1540" width="984" height="200" rx="24" fill="#0e0e0e" stroke="#c8a961" stroke-width="1.5" opacity="0.9"/>
    <text x="200" y="1650" fill="url(#warm)" font-size="92" font-weight="700">0</text>
    <text x="380" y="1635" fill="#cfcfcf" font-size="44">keys. No signup.</text>
    <text x="380" y="1690" fill="#6f6f6f" font-size="32">pay-per-call in USDC via x402</text>

    <rect x="150" y="1780" width="984" height="200" rx="24" fill="#0e0e0e" stroke="#c8a961" stroke-width="1.5" opacity="0.9"/>
    <text x="200" y="1890" fill="url(#warm)" font-size="92" font-weight="700">6</text>
    <text x="380" y="1875" fill="#cfcfcf" font-size="44">independent signals</text>
    <text x="380" y="1930" fill="#6f6f6f" font-size="32">multi-source consensus verdict</text>
  </g>

  <!-- footer -->
  <text x="642" y="2520" text-anchor="middle" fill="#c8a961" font-family="DejaVu Sans Mono, monospace" font-size="46" opacity="0.9">mcp.vigil.codes</text>
  <rect x="40" y="40" width="1204" height="2698" rx="40" fill="none" stroke="#c8a961" stroke-width="1.5" opacity="0.18"/>
</svg>
