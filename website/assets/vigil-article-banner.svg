<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 600" fill="none">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8a961"/>
      <stop offset="100%" stop-color="#e8d5a3"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#c8a961" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#080808" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1500" height="600" fill="#080808"/>
  <rect width="1500" height="600" fill="url(#glow)"/>

  <!-- subtle grid -->
  <g stroke="#c8a961" stroke-width="0.5" opacity="0.05">
    <line x1="0" y1="150" x2="1500" y2="150"/>
    <line x1="0" y1="300" x2="1500" y2="300"/>
    <line x1="0" y1="450" x2="1500" y2="450"/>
    <line x1="375" y1="0" x2="375" y2="600"/>
    <line x1="750" y1="0" x2="750" y2="600"/>
    <line x1="1125" y1="0" x2="1125" y2="600"/>
  </g>

  <text x="100" y="100" fill="#c8a961" font-family="'Courier New', monospace" font-size="13" letter-spacing="6" opacity="0.6">ONCHAIN SECURITY . FOR AGENTS . ON BASE</text>

  <!-- big title -->
  <text x="100" y="220" fill="#d4d0c8" font-family="Georgia, serif" font-size="76">Scan before</text>
  <text x="100" y="298" fill="url(#gold)" font-family="Georgia, serif" font-size="76" font-style="italic">you sign.</text>

  <text x="100" y="360" fill="#9a968e" font-family="Georgia, serif" font-size="22">A security layer any AI agent can call before it acts —</text>
  <text x="100" y="392" fill="#9a968e" font-family="Georgia, serif" font-size="22">honeypots, rugs, and safety scores in milliseconds.</text>

  <!-- bottom badges -->
  <g transform="translate(100, 470)" font-family="'Courier New', monospace" font-size="13">
    <rect x="0" y="0" width="200" height="44" rx="22" fill="none" stroke="#c8a961" stroke-width="1" opacity="0.4"/>
    <text x="100" y="29" text-anchor="middle" fill="#c8a961">12 READ-ONLY TOOLS</text>
    <rect x="216" y="0" width="240" height="44" rx="22" fill="none" stroke="#c8a961" stroke-width="1" opacity="0.4"/>
    <text x="336" y="29" text-anchor="middle" fill="#c8a961">MULTI-SOURCE CONSENSUS</text>
    <rect x="472" y="0" width="180" height="44" rx="22" fill="none" stroke="#c8a961" stroke-width="1" opacity="0.4"/>
    <text x="562" y="29" text-anchor="middle" fill="#c8a961">USDC VIA x402</text>
  </g>

  <!-- right shield/owl mark (simple geometric VIGIL logo cue) -->
  <g transform="translate(1180, 180)" stroke="#c8a961" stroke-width="2" fill="none" opacity="0.85">
    <!-- shield outline -->
    <path d="M120,0 L240,40 L240,180 Q240,260 120,300 Q0,260 0,180 L0,40 Z" opacity="0.35"/>
    <!-- owl eyes -->
    <circle cx="80" cy="135" r="22" stroke-width="2.5"/>
    <circle cx="160" cy="135" r="22" stroke-width="2.5"/>
    <circle cx="80" cy="135" r="8" fill="#c8a961"/>
    <circle cx="160" cy="135" r="8" fill="#c8a961"/>
    <!-- beak -->
    <path d="M108,170 L120,194 L132,170" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"/>
    <!-- scan line -->
    <line x1="40" y1="135" x2="200" y2="135" stroke-width="0.6" opacity="0.3"/>
  </g>

  <text x="100" y="560" fill="#6b6860" font-family="'Courier New', monospace" font-size="13">vigil.codes  ·  @vigilcodes  ·  built for the agent economy</text>
</svg>
