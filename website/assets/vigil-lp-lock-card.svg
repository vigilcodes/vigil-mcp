<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8a961"/>
      <stop offset="100%" stop-color="#e8d5a3"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#080808"/>

  <text x="80" y="68" fill="#c8a961" font-family="'Courier New', monospace" font-size="11" letter-spacing="4" opacity="0.5">VIGIL . LIQUIDITY LOCK SCANNER</text>
  <text x="80" y="118" fill="#d4d0c8" font-family="Georgia, serif" font-size="42">Locked, burned, or pulled?</text>
  <text x="80" y="152" fill="#6b6860" font-family="Georgia, serif" font-size="19" font-style="italic">we tell you before the deployer pulls the rug.</text>
  <line x1="80" y1="174" x2="340" y2="174" stroke="#c8a961" stroke-width="1" opacity="0.25"/>

  <!-- Four verdict states -->
  <text x="80" y="218" fill="#6b6860" font-family="'Courier New', monospace" font-size="13" letter-spacing="3">FOUR STATES . NEVER SAFE-WHEN-UNCERTAIN</text>
  <g font-family="'Courier New', monospace" font-size="15" transform="translate(80, 244)">
    <g transform="translate(0,0)">
      <rect width="248" height="76" rx="8" fill="#0e1a0e" stroke="#6bbd6b" stroke-width="1" opacity="0.9"/>
      <circle cx="32" cy="38" r="9" fill="#6bbd6b"/>
      <text x="56" y="34" fill="#d4d0c8" font-size="18">LOCKED</text>
      <text x="56" y="56" fill="#6b6860" font-size="11">≥80% in known locker</text>
    </g>
    <g transform="translate(264,0)">
      <rect width="248" height="76" rx="8" fill="#0e1a0e" stroke="#6bbd6b" stroke-width="1" opacity="0.9"/>
      <circle cx="32" cy="38" r="9" fill="#6bbd6b"/>
      <text x="56" y="34" fill="#d4d0c8" font-size="18">BURNED</text>
      <text x="56" y="56" fill="#6b6860" font-size="11">≥80% sent to dEaD</text>
    </g>
    <g transform="translate(528,0)">
      <rect width="248" height="76" rx="8" fill="#1a0e0e" stroke="#bd6b6b" stroke-width="1" opacity="0.9"/>
      <circle cx="32" cy="38" r="9" fill="#bd6b6b"/>
      <text x="56" y="34" fill="#d4d0c8" font-size="18">UNLOCKED</text>
      <text x="56" y="56" fill="#6b6860" font-size="11">withdrawable . rug risk</text>
    </g>
    <g transform="translate(792,0)">
      <rect width="248" height="76" rx="8" fill="#0d0d0d" stroke="#c8a961" stroke-width="1" opacity="0.7"/>
      <circle cx="32" cy="38" r="9" fill="#c8a961"/>
      <text x="56" y="34" fill="#d4d0c8" font-size="18">UNKNOWN</text>
      <text x="56" y="56" fill="#6b6860" font-size="11">no data ≠ safe</text>
    </g>
  </g>

  <!-- left: how it works -->
  <text x="80" y="378" fill="#6b6860" font-family="'Courier New', monospace" font-size="13" letter-spacing="3">HOW IT WORKS</text>
  <g font-family="'Courier New', monospace" font-size="14" transform="translate(80, 408)">
    <g transform="translate(0,0)">
      <rect width="500" height="34" rx="6" fill="#0c0c0c" stroke="#1e1e1c" stroke-width="1"/>
      <text x="20" y="22" fill="#c8a961">01</text>
      <text x="60" y="22" fill="#d4d0c8">find deepest LP pair . dexscreener</text>
    </g>
    <g transform="translate(0,42)">
      <rect width="500" height="34" rx="6" fill="#0c0c0c" stroke="#1e1e1c" stroke-width="1"/>
      <text x="20" y="22" fill="#c8a961">02</text>
      <text x="60" y="22" fill="#d4d0c8">read totalSupply + balanceOf onchain</text>
    </g>
    <g transform="translate(0,84)">
      <rect width="500" height="34" rx="6" fill="#0c0c0c" stroke="#1e1e1c" stroke-width="1"/>
      <text x="20" y="22" fill="#c8a961">03</text>
      <text x="60" y="22" fill="#d4d0c8">classify against 80% threshold</text>
    </g>
    <g transform="translate(0,126)">
      <rect width="500" height="34" rx="6" fill="#0c0c0c" stroke="#1e1e1c" stroke-width="1"/>
      <text x="20" y="22" fill="#c8a961">04</text>
      <text x="60" y="22" fill="#d4d0c8">vote in 6-source consensus</text>
    </g>
  </g>

  <!-- right: the principle -->
  <g transform="translate(640, 408)">
    <rect width="480" height="160" rx="10" fill="#0d0d0d" stroke="#c8a961" stroke-width="1" opacity="0.25"/>
    <text x="30" y="44" fill="#c8a961" font-family="'Courier New', monospace" font-size="12" letter-spacing="2">FAIL-SAFE BY DESIGN</text>
    <text x="30" y="84" fill="#d4d0c8" font-family="Georgia, serif" font-size="22">missing data returns</text>
    <text x="30" y="114" fill="#d4d0c8" font-family="Georgia, serif" font-size="22">unknown — never safe.</text>
    <text x="30" y="142" fill="#6b6860" font-family="Georgia, serif" font-size="15" font-style="italic">a guess is the failure mode.</text>
  </g>

  <line x1="80" y1="588" x2="1120" y2="588" stroke="#1e1e1c" stroke-width="1"/>
  <text x="80" y="616" fill="#6b6860" font-family="'Courier New', monospace" font-size="13">vigil_liquidity_lock . free . live on mcp.vigil.codes</text>
  <text x="1120" y="616" text-anchor="end" fill="#c8a961" font-family="'Courier New', monospace" font-size="13" opacity="0.7">vigil.codes</text>
</svg>
