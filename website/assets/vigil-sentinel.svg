<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8a961"/>
      <stop offset="100%" stop-color="#e8d5a3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#080808"/>

  <!-- Top label -->
  <text x="80" y="55" fill="#c8a961" font-family="'Courier New', monospace" font-size="11" letter-spacing="4" opacity="0.5">VIGIL . SENTINEL . AUTONOMOUS</text>

  <!-- Title -->
  <text x="80" y="108" fill="#d4d0c8" font-family="Georgia, serif" font-size="44">While you sleep,</text>
  <text x="80" y="160" fill="#c8a961" font-family="Georgia, serif" font-size="44">VIGIL scans.</text>
  <line x1="80" y1="182" x2="320" y2="182" stroke="#c8a961" stroke-width="1" opacity="0.2"/>

  <!-- Timeline -->
  <g transform="translate(80, 230)">
    <!-- Timeline line -->
    <line x1="20" y1="0" x2="20" y2="300" stroke="#1e1e1c" stroke-width="2"/>
    
    <!-- Time marker 1 -->
    <circle cx="20" cy="20" r="8" fill="#080808" stroke="#c8a961" stroke-width="1.5"/>
    <circle cx="20" cy="20" r="3" fill="#c8a961"/>
    <text x="48" y="16" fill="#6b6860" font-family="'Courier New', monospace" font-size="11">00:00 UTC</text>
    <text x="48" y="34" fill="#d4d0c8" font-family="Georgia, serif" font-size="18">Full wallet scan — all approvals</text>
    <text x="48" y="52" fill="#6b6860" font-family="'Courier New', monospace" font-size="12">scanning 14 approvals · 3 flagged unlimited</text>

    <!-- Time marker 2 -->
    <circle cx="20" cy="100" r="8" fill="#080808" stroke="#c8a961" stroke-width="1.5"/>
    <circle cx="20" cy="100" r="3" fill="#c8a961"/>
    <text x="48" y="96" fill="#6b6860" font-family="'Courier New', monospace" font-size="11">06:00 UTC</text>
    <text x="48" y="114" fill="#d4d0c8" font-family="Georgia, serif" font-size="18">Consensus check — new token interactions</text>
    <text x="48" y="132" fill="#6b6860" font-family="'Courier New', monospace" font-size="12">5 sources consulted · all clear</text>

    <!-- Time marker 3 — ALERT -->
    <circle cx="20" cy="180" r="8" fill="#080808" stroke="#ef4444" stroke-width="2"/>
    <circle cx="20" cy="180" r="3" fill="#ef4444"/>
    <text x="48" y="176" fill="#6b6860" font-family="'Courier New', monospace" font-size="11">12:00 UTC</text>
    <g transform="translate(48, 186)">
      <rect width="420" height="50" rx="6" fill="rgba(239,68,68,0.06)" stroke="#ef4444" stroke-width="1" opacity="0.5"/>
      <text x="14" y="20" fill="#ef4444" font-family="'Courier New', monospace" font-size="12" letter-spacing="2">⚠ ALERT</text>
      <text x="14" y="40" fill="#d4d0c8" font-family="Georgia, serif" font-size="15">New unlimited approval to unverified contract</text>
    </g>

    <!-- Time marker 4 -->
    <circle cx="20" cy="270" r="8" fill="#080808" stroke="#c8a961" stroke-width="1.5"/>
    <circle cx="20" cy="270" r="3" fill="#c8a961"/>
    <text x="48" y="266" fill="#6b6860" font-family="'Courier New', monospace" font-size="11">18:00 UTC</text>
    <text x="48" y="284" fill="#d4d0c8" font-family="Georgia, serif" font-size="18">Score re-check — honeypot simulation</text>
    <text x="48" y="302" fill="#6b6860" font-family="'Courier New', monospace" font-size="12">all tokens pass · scores holding</text>
  </g>

  <!-- Right side: summary panel -->
  <g transform="translate(680, 230)">
    <rect width="440" height="300" rx="10" fill="#0d0d0d" stroke="#1e1e1c" stroke-width="1"/>
    
    <text x="30" y="40" fill="#c8a961" font-family="'Courier New', monospace" font-size="11" letter-spacing="3">SENTINEL MODE</text>
    <line x1="30" y1="55" x2="410" y2="55" stroke="#1e1e1c" stroke-width="1"/>

    <g font-family="'Courier New', monospace" font-size="14">
      <text x="30" y="90" fill="#c8a961" opacity="0.7">frequency</text>
      <text x="200" y="90" fill="#d4d0c8">every 6 hours</text>

      <text x="30" y="120" fill="#c8a961" opacity="0.7">checks</text>
      <text x="200" y="120" fill="#d4d0c8">approvals · honeypots · scores</text>

      <text x="30" y="150" fill="#c8a961" opacity="0.7">alerts</text>
      <text x="200" y="150" fill="#d4d0c8">risky approval · score drop</text>

      <text x="30" y="180" fill="#c8a961" opacity="0.7">mode</text>
      <text x="200" y="180" fill="#d4d0c8">autonomous · no babysitting</text>

      <text x="30" y="210" fill="#c8a961" opacity="0.7">cost</text>
      <text x="200" y="210" fill="#d4d0c8">free · read-only · no API key</text>
    </g>

    <line x1="30" y1="235" x2="410" y2="235" stroke="#1e1e1c" stroke-width="1"/>
    <text x="30" y="270" fill="#d4d0c8" font-family="Georgia, serif" font-size="18">Your wallet has a</text>
    <text x="30" y="295" fill="#c8a961" font-family="Georgia, serif" font-size="20" filter="url(#glow-soft)">night watch.</text>
  </g>

  <!-- Bottom bar -->
  <line x1="80" y1="565" x2="1120" y2="565" stroke="#1e1e1c" stroke-width="1"/>
  <text x="80" y="598" fill="#6b6860" font-family="'Courier New', monospace" font-size="13">sentinel · autonomous wallet monitoring · 4 sweeps per day</text>
  <text x="1120" y="598" text-anchor="end" fill="#c8a961" font-family="'Courier New', monospace" font-size="13" opacity="0.7">mcp.vigil.codes</text>
</svg>