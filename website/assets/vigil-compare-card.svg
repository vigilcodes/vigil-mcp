<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8a961"/>
      <stop offset="100%" stop-color="#e8d5a3"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#080808"/>

  <text x="80" y="70" fill="#c8a961" font-family="'Courier New', monospace" font-size="11" letter-spacing="4" opacity="0.5">VIGIL . KNOWN-ANSWER SCANS . BASE</text>
  <text x="80" y="122" fill="#d4d0c8" font-family="Georgia, serif" font-size="44">VIGIL tells the difference</text>
  <line x1="80" y1="146" x2="360" y2="146" stroke="#c8a961" stroke-width="1" opacity="0.25"/>

  <!-- SAFE column -->
  <text x="80" y="196" fill="#6bbd6b" font-family="'Courier New', monospace" font-size="13" letter-spacing="3">✓ VERIFIED SAFE</text>
  <g transform="translate(80, 214)">
    <g transform="translate(0,0)">
      <rect width="480" height="80" rx="10" fill="#0e1a0e" stroke="#6bbd6b" stroke-width="1" opacity="0.9"/>
      <text x="28" y="50" fill="#d4d0c8" font-family="Georgia, serif" font-size="26">USDC <tspan fill="#6b6860" font-size="14" font-family="'Courier New', monospace">USD Coin</tspan></text>
      <text x="452" y="50" text-anchor="end" fill="#6bbd6b" font-family="Georgia, serif" font-size="34">92<tspan font-size="16" fill="#6b6860">/100</tspan></text>
    </g>
    <g transform="translate(0,94)">
      <rect width="480" height="80" rx="10" fill="#0e1a0e" stroke="#6bbd6b" stroke-width="1" opacity="0.9"/>
      <text x="28" y="50" fill="#d4d0c8" font-family="Georgia, serif" font-size="26">WETH <tspan fill="#6b6860" font-size="14" font-family="'Courier New', monospace">Wrapped Ether</tspan></text>
      <text x="452" y="50" text-anchor="end" fill="#6bbd6b" font-family="Georgia, serif" font-size="34">90<tspan font-size="16" fill="#6b6860">/100</tspan></text>
    </g>
  </g>

  <!-- DANGER column -->
  <text x="640" y="196" fill="#bd6b6b" font-family="'Courier New', monospace" font-size="13" letter-spacing="3">✕ FLAGGED</text>
  <g transform="translate(640, 214)">
    <g transform="translate(0,0)">
      <rect width="480" height="80" rx="10" fill="#1a0e0e" stroke="#bd6b6b" stroke-width="1" opacity="0.9"/>
      <text x="28" y="44" fill="#d4d0c8" font-family="Georgia, serif" font-size="22">No-code address</text>
      <text x="28" y="66" fill="#6b6860" font-family="'Courier New', monospace" font-size="12">nothing deployed here</text>
      <text x="452" y="52" text-anchor="end" fill="#bd6b6b" font-family="Georgia, serif" font-size="30">CRITICAL</text>
    </g>
    <g transform="translate(0,94)">
      <rect width="480" height="80" rx="10" fill="#1a0e0e" stroke="#bd6b6b" stroke-width="1" opacity="0.9"/>
      <text x="28" y="44" fill="#d4d0c8" font-family="Georgia, serif" font-size="22">Honeypot check</text>
      <text x="28" y="66" fill="#6b6860" font-family="'Courier New', monospace" font-size="12">no contract code → blocked</text>
      <text x="452" y="52" text-anchor="end" fill="#bd6b6b" font-family="Georgia, serif" font-size="24">BLOCKED</text>
    </g>
  </g>

  <!-- strip -->
  <g transform="translate(80, 430)">
    <rect width="1040" height="92" rx="10" fill="#0d0d0d" stroke="#c8a961" stroke-width="1" opacity="0.3"/>
    <text x="30" y="40" fill="#c8a961" font-family="'Courier New', monospace" font-size="12" letter-spacing="2">THE WHOLE JOB</text>
    <text x="30" y="72" fill="#d4d0c8" font-family="Georgia, serif" font-size="21">Good token in → real score. Garbage in → flagged, never a fake "safe".</text>
  </g>

  <line x1="80" y1="558" x2="1120" y2="558" stroke="#1e1e1c" stroke-width="1"/>
  <text x="80" y="594" fill="#6b6860" font-family="'Courier New', monospace" font-size="13">scan any Base token yourself · no key</text>
  <text x="1120" y="594" text-anchor="end" fill="#c8a961" font-family="'Courier New', monospace" font-size="13" opacity="0.7">vigil.codes/scan</text>
</svg>
